# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Root project dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Group minor/patch updates to reduce PR noise
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Firebase Data Connect generated SDK — local path dep, gitignored,
      # unreachable from Dependabot's sandboxed checkout.
      - dependency-name: "@dataconnect/generated"
      # eslint-plugin-react-hooks 7.1+ adds the react-hooks/set-state-in-effect
      # rule which requires a codebase-wide cleanup pass (37+ warnings across
      # admin/errors-tab, notebook/today-page, etc.). Pinned to 7.0.x until
      # the cleanup lands. See T51 (Session #288 triage).
      - dependency-name: "eslint-plugin-react-hooks"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # Firebase Functions dependencies
  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      # Group all GitHub Actions updates to reduce PR noise
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci)"
