# OpenSSF Scorecard - Security health metrics for the repository
# Purpose: Automated security analysis using OpenSSF Scorecard
# Docs: https://github.com/ossf/scorecard-action
#
# Version History
# | Version | Date       | Changes         |
# | ------- | ---------- | --------------- |
# | 1.0     | 2026-03-18 | Initial release |

name: OpenSSF Scorecard

on:
  # Run on pushes to main to track security posture over time
  push:
    branches: [main]
  # Weekly scan to catch drift
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6:00 UTC

# Declare default permissions as read-only
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Needed for Code Scanning upload
      security-events: write
      # Needed for GITHUB_TOKEN access
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to OpenSSF REST API
          publish_results: true

      - name: Upload Scorecard results to Code Scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
