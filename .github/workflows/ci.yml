name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run oxlint (fast correctness check)
        run: npm run lint:fast

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting (Prettier)
        # Now blocking - initial format applied 2026-01-13
        run: npm run format:check

      - name: Check for circular dependencies
        run: npm run deps:circular

      - name: Check for unused dependencies/exports
        # Now blocking - knip passes clean (2026-02-02)
        run: npm run deps:unused

      - name: Get changed files for pattern check
        if: ${{ github.event_name == 'pull_request' }}
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47.0.5
        with:
          files: |
            **/*.js
            **/*.ts
            **/*.tsx
            **/*.jsx
            **/*.sh
            **/*.yml
            **/*.yaml
            .husky/**
          separator: " "

      - name: Pattern compliance check (PR - changed files only)
        if: ${{ github.event_name == 'pull_request' && steps.changed-files.outputs.any_changed == 'true' }}
        run: |
          echo "Checking pattern compliance on changed files..."
          echo "Files to check: ${{ steps.changed-files.outputs.all_changed_files }}"
          # Use -- to prevent filenames starting with - from being interpreted as options
          node scripts/check-pattern-compliance.js -- ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Pattern compliance check (PR - no relevant files changed)
        if: ${{ github.event_name == 'pull_request' && steps.changed-files.outputs.any_changed != 'true' }}
        run: echo "No pattern-checkable files changed, skipping pattern compliance"

      - name: Pattern compliance check (push to main)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        # For push to main, run full check but don't block (baseline exists)
        # This provides visibility without blocking merges
        continue-on-error: true
        run: npm run patterns:check-all

      - name: Pattern test suite
        run: npx vitest run tests/pattern-compliance.test.js

      - name: GitHub optimization wave tests
        run: node --test tests/scripts/github-optimization-wave3.test.js tests/scripts/github-optimization-wave4.test.js

      - name: Documentation check
        # Non-blocking: templates/stubs have expected issues, active docs are clean
        continue-on-error: true
        run: npm run docs:check

      - name: Validate CANON schema
        # Validates all CANON*.jsonl files have correct structure
        run: npm run validate:canon

      - name: Validate audit files
        # Validates audit JSONL files have required fields
        # Review #207: Use -- to pass args through npm to the script
        continue-on-error: true
        run: npm run audit:validate -- --all

      - name: Validate technical debt schema
        # TDMS Phase 8: Validates MASTER_DEBT.jsonl has correct structure
        if: ${{ hashFiles('docs/technical-debt/MASTER_DEBT.jsonl') != '' }}
        run: node scripts/debt/validate-schema.js

      - name: Check ROADMAP debt references
        # TDMS Phase 8: Validates DEBT-XXXX references exist in canonical source
        # Now blocking - prevents orphaned DEBT-XXXX references (2026-02-02)
        if: ${{ hashFiles('docs/technical-debt/MASTER_DEBT.jsonl') != '' }}
        run: node scripts/debt/sync-roadmap-refs.js --check-only

      - name: Verify technical debt views current
        # TDMS Phase 8: Ensures generated views match MASTER_DEBT.jsonl
        if: ${{ hashFiles('docs/technical-debt/MASTER_DEBT.jsonl') != '' }}
        continue-on-error: true
        run: |
          node scripts/debt/generate-views.js
          git diff --exit-code docs/technical-debt/views/ || echo "⚠️ Views are stale - run: node scripts/debt/generate-views.js"

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          NEXT_PUBLIC_FIREBASE_API_KEY: test
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: test
          NEXT_PUBLIC_FIREBASE_APP_ID: test

      - name: Enforce coverage thresholds
        run: |
          echo "Checking overall coverage threshold (65% line coverage)..."
          npx c8 check-coverage --lines 65 || {
            echo "::error::Overall line coverage below 65% threshold"
            exit 1
          }

      - name: Check test coverage completeness
        # Blocks if NEW untested scripts found (not in .test-baseline.json)
        # Known gaps in baseline are allowed; only new gaps fail CI
        run: node scripts/generate-test-registry.js --check-coverage

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.4.2
        with:
          directory: coverage/
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-typecheck-test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
