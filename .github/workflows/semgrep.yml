name: Semgrep

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "17 13 * * 3"

permissions:
  contents: read

jobs:
  semgrep:
    permissions:
      contents: read
      security-events: write
      actions: read
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Semgrep
        run: pip install semgrep

      # Run local custom rules from .semgrep/rules/
      # No --error flag: findings are informational (uploaded via SARIF).
      - name: Run local custom rules
        run: |
          semgrep --config .semgrep/rules/ \
            --sarif \
            --output=semgrep-local.sarif \
            . || true

      # Test Semgrep rules against annotation files
      - name: Test Semgrep rules
        if: always()
        run: |
          semgrep --test \
            --config .semgrep/rules/ \
            tests/semgrep/

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep-local.sarif') != ''
        with:
          sarif_file: semgrep-local.sarif
          category: semgrep-local
