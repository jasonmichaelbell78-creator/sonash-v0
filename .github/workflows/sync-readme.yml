name: Sync README Status

on:
  push:
    branches: [main]
    paths:
      - "ROADMAP.md"

permissions: {}

# Prevent race conditions from concurrent pushes
concurrency:
  group: sync-readme-main
  cancel-in-progress: false

jobs:
  sync-readme:
    name: Update README Status from ROADMAP
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run README status update
        run: node scripts/update-readme-status.js

      - name: Format README with Prettier
        run: npx --no-install prettier --write README.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if changed
        if: ${{ steps.changes.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/sync-readme-$(date +%Y%m%d-%H%M%S)"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add README.md
          git commit --no-verify -m "docs: Auto-sync README status from ROADMAP.md"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: Auto-sync README status from ROADMAP.md" \
            --body "Automated PR to sync README status badges with ROADMAP.md changes." \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --auto --merge
