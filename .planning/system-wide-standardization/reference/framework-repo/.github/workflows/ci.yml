name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting (Prettier)
        run: npm run format:check

      - name: Check for circular dependencies
        run: npm run deps:circular

      - name: Check for unused dependencies/exports
        continue-on-error: true
        run: npm run deps:unused

      - name: Get changed files for pattern check
        if: ${{ github.event_name == 'pull_request' }}
        id: changed-files
        # Pinned to SHA for supply chain security (see CVE-2025-30066)
        uses: tj-actions/changed-files@26a38635fc1173cc5820336ce97be6188d0de9f5 # v46.0.2
        with:
          files: |
            **/*.js
            **/*.ts
            **/*.tsx
            **/*.jsx
            **/*.sh
            **/*.yml
            **/*.yaml
            .husky/**
          json: true

      - name: Pattern compliance check (PR - changed files only)
        if: ${{ github.event_name == 'pull_request' && steps.changed-files.outputs.any_changed == 'true' }}
        env:
          CHANGED_FILES_JSON: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo "Checking pattern compliance on changed files..."
          node -e '
            const files = JSON.parse(process.env.CHANGED_FILES_JSON);
            const { execFileSync } = require("child_process");
            try {
              execFileSync("node", ["scripts/reviews/check-pattern-compliance.js", "--", ...files], { stdio: "inherit" });
            } catch (e) { process.exit(e.status || 1); }
          '

      - name: Pattern compliance check (push to main)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        continue-on-error: true
        run: npm run patterns:check-all

      - name: Documentation check
        continue-on-error: true
        run: npm run docs:check

      - name: Validate technical debt schema
        if: ${{ hashFiles('docs/technical-debt/MASTER_DEBT.jsonl') != '' }}
        run: node scripts/debt/validate-schema.js

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
