# SonarCloud Configuration
# See: https://docs.sonarsource.com/sonarcloud/advanced-setup/ci-based-analysis/sonarscanner-for-npm/

sonar.projectKey=jasonmichaelbell78-creator_framework
sonar.organization=jasonmichaelbell78-creator

# Source configuration
sonar.sources=scripts,eslint-plugin-framework
sonar.sourceEncoding=UTF-8

# Exclusions for generated and third-party code
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.claude/skills/**,**/.claude/agents/**

# Test file exclusions (from coverage analysis)
sonar.coverage.exclusions=**/*.test.js,**/*.test.mjs,**/*.spec.js,**/*.spec.mjs

# JavaScript coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# =============================================================================
# Rule-Specific Exclusions (known false positives)
# =============================================================================
sonar.issue.ignore.multicriteria=fp1,fp2,fp3

# CLI scripts use console.log intentionally (structured logging tracked in TDMS)
sonar.issue.ignore.multicriteria.fp1.ruleKey=javascript:S106
sonar.issue.ignore.multicriteria.fp1.resourceKey=scripts/**/*.js

# Dev scripts — controlled inputs from CLI (false positive for path injection)
sonar.issue.ignore.multicriteria.fp2.ruleKey=javascript:S4790
sonar.issue.ignore.multicriteria.fp2.resourceKey=scripts/**/*.js

# ESLint plugin test helpers — acceptable patterns
sonar.issue.ignore.multicriteria.fp3.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.fp3.resourceKey=eslint-plugin-framework/**/*.js

# =============================================================================
# Duplication Exclusions (config files have expected similarity)
# =============================================================================
sonar.cpd.exclusions=scripts/config/**,**/*.config.mjs

# =============================================================================
# Quality Gate Notes
# =============================================================================
# Baseline (2026-03-01): Initial configuration
# Target: No new critical/blocker issues, gradual reduction of major issues
