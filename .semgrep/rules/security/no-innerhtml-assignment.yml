rules:
  - id: sonash.security.no-innerhtml-assignment
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Direct innerHTML/outerHTML assignment detected. This enables XSS attacks
      if the value contains user-controlled data. Use textContent for plain text
      or a sanitization library (DOMPurify) for HTML content.
    metadata:
      category: security
      code-pattern-ref: "Security"
      confidence: HIGH
      cwe: "CWE-79: Cross-site Scripting (XSS)"
    pattern-either:
      - pattern: $EL.innerHTML = $VAL
      - pattern: $EL.outerHTML = $VAL
    paths:
      exclude:
        - tests/
        - "*.test.*"
        - "*.spec.*"
