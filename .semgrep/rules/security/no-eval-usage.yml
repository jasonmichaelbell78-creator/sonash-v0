rules:
  - id: sonash.security.no-eval-usage
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      eval() or string-based setTimeout/setInterval detected. These execute
      arbitrary code and enable injection attacks. Use safer alternatives like
      JSON.parse() for data, explicit function references for dynamic dispatch,
      or arrow functions for setTimeout/setInterval callbacks.
    metadata:
      category: security
      code-pattern-ref: "Shell interpolation"
      confidence: HIGH
      cwe: "CWE-95: Eval Injection"
    pattern-either:
      # eval() is always dangerous
      - pattern: eval(...)
      # Only flag setTimeout/setInterval when the callback is a string literal
      # (the actual security risk). Function references are safe.
      - patterns:
          - pattern: setTimeout($CB, ...)
          - metavariable-regex:
              metavariable: $CB
              regex: '^[''"].*'
      - patterns:
          - pattern: setInterval($CB, ...)
          - metavariable-regex:
              metavariable: $CB
              regex: '^[''"].*'
    paths:
      exclude:
        - node_modules/
        - tests/
        - "*.test.*"
  # Separate rule for constructor-based eval (split to avoid pattern-not conflicts)
  - id: sonash.security.no-eval-constructor
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Function() constructor detected. This executes arbitrary code and enables
      injection attacks. Use safer alternatives like JSON.parse() for data or
      explicit function references for dynamic dispatch.
    metadata:
      category: security
      code-pattern-ref: "Shell interpolation"
      confidence: HIGH
      cwe: "CWE-95: Eval Injection"
    pattern-either:
      - pattern: new Function(...)
      - pattern: Function(...)
    paths:
      exclude:
        - node_modules/
        - tests/
        - "*.test.*"
