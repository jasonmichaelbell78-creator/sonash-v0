rules:
  - id: sonash.security.no-hardcoded-secrets
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Possible hardcoded secret detected. API keys, tokens, and passwords must
      come from environment variables or secret managers, never from string
      literals in source code.
    metadata:
      category: security
      code-pattern-ref: ".env files"
      confidence: MEDIUM
      cwe: "CWE-798: Use of Hard-coded Credentials"
    pattern-either:
      - pattern: |
          const $KEY = "AIza$REST"
      - pattern: |
          const $KEY = "sk-$REST"
      - pattern: |
          const $KEY = "ghp_$REST"
      - pattern: |
          const $KEY = "gho_$REST"
      - pattern: |
          const $KEY = "xoxb-$REST"
      - pattern: |
          const $KEY = "xoxp-$REST"
      - pattern: |
          let $KEY = "AIza$REST"
      - pattern: |
          var $KEY = "AIza$REST"
    paths:
      exclude:
        - tests/
        - "*.test.*"
        - "*.spec.*"
        - "*.example.*"
        - docs/
