rules:
  - id: sonash.correctness.no-floating-promise
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Known async function called without await, .then(), or .catch().
      Floating promises hide errors silently. Add await, .catch(), or void
      operator if intentionally fire-and-forget.
    metadata:
      category: correctness
      code-pattern-ref: "Safe error handling"
      confidence: HIGH
    pattern-either:
      - patterns:
          - pattern: fetch(...);
          - pattern-not: await fetch(...)
          - pattern-not: void fetch(...)
          - pattern-not: return fetch(...)
      - patterns:
          - pattern: $OBJ.json();
          - pattern-not: await $OBJ.json()
          - pattern-not: return $OBJ.json()
      - patterns:
          - pattern: fs.promises.$METHOD(...);
          - pattern-not: await fs.promises.$METHOD(...)
          - pattern-not: return fs.promises.$METHOD(...)
      - patterns:
          - pattern: $OBJ.writeFile(...);
          - pattern-not: await $OBJ.writeFile(...)
          - pattern-not: return $OBJ.writeFile(...)
      - patterns:
          - pattern: $OBJ.readFile(...);
          - pattern-not: await $OBJ.readFile(...)
          - pattern-not: return $OBJ.readFile(...)
    paths:
      exclude:
        - tests/
        - "*.test.*"
        - "*.spec.*"
