rules:
  - id: sonash.correctness.no-floating-promise
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Promise-returning function called without await, .then(), or .catch().
      Floating promises hide errors silently. Add await, .catch(), or void
      operator if intentionally fire-and-forget.
    metadata:
      category: correctness
      code-pattern-ref: "General"
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: |
              $FN(...);
      - pattern: |
          $OBJ.$METHOD(...);
      - pattern-not: await $FN(...)
      - pattern-not: $FN(...).then(...)
      - pattern-not: $FN(...).catch(...)
      - pattern-not: void $FN(...)
      - pattern-not: return $FN(...)
    paths:
      exclude:
        - tests/
        - "*.test.*"
        - "*.spec.*"
